services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tacticae
      POSTGRES_USER: tacticae
      POSTGRES_PASSWORD: tacticae
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tacticae"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: tacticae:dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/tacticae
      DATABASE_USER: tacticae
      DATABASE_PASSWORD: tacticae
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: