services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tacticae
      POSTGRES_USER: tacticae
      POSTGRES_PASSWORD: tacticae
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tacticae"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: